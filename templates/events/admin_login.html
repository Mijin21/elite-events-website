<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — EventLuxe</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0D0D0D;
  color: #F0EBE0;
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.login-card {
  background: #141414;
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 16px;
  padding: 2.5rem;
  width: 100%;
  max-width: 400px;
}
.brand {
  text-align: center;
  margin-bottom: 2rem;
}
.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 700;
  color: #F0EBE0;
}
.brand-name span { color: #C9A84C; }
.brand-tag {
  font-size: 0.7rem;
  color: #5A5248;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-top: 0.25rem;
}
.field-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  margin-bottom: 1rem;
}
label {
  font-size: 0.72rem;
  color: #9A9080;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
input {
  background: #202020;
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 8px;
  color: #F0EBE0;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  padding: 0.7rem 0.9rem;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
input:focus { border-color: rgba(201,168,76,0.5); }
.btn-login {
  width: 100%;
  padding: 0.75rem;
  background: linear-gradient(135deg, #8B6914, #C9A84C);
  border: none;
  border-radius: 8px;
  color: #0A0A0A;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: filter 0.2s;
}
.btn-login:hover { filter: brightness(1.1); }
.error-msg {
  background: rgba(224,82,82,0.1);
  border: 1px solid rgba(224,82,82,0.2);
  border-radius: 8px;
  color: #E05252;
  font-size: 0.82rem;
  padding: 0.65rem 0.9rem;
  margin-bottom: 1rem;
  text-align: center;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-name">Event<span>Luxe</span></div>
    <div class="brand-tag">Admin Panel</div>
  </div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{% url 'admin_panel:login' %}">
    {% csrf_token %}
    <div class="field-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required autofocus>
    </div>
    <div class="field-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn-login">Login to Admin Panel</button>
  </form>
</div>
</body>
</html>
